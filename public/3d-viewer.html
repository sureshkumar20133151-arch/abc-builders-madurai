<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Walkthrough Viewer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: #0b132b;
            font-family: sans-serif;
            color: #ffffff;
        }
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1c2541 0%, #0b132b 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.8s ease-out;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #fb8b24;
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 1px;
            color: #ffffff;
        }
        .loading-subtext {
            font-size: 0.9rem;
            color: #fb8b24;
            margin-top: 8px;
            font-weight: bold;
        }
        .progress-container {
            width: 240px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 16px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #fb8b24, #ffba08);
            border-radius: 3px;
            transition: width 0.4s ease;
        }
        .progress-percent {
            font-size: 2rem;
            font-weight: 700;
            color: #fb8b24;
            margin-top: 12px;
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(11, 19, 43, 0.85);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            font-size: 0.85rem;
            pointer-events: none;
            letter-spacing: 0.5px;
            z-index: 999;
            text-align: center;
            display: flex;
            gap: 15px;
        }
        .hint-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .hint-icon {
            color: #fb8b24;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Loading 3D Walkthrough...</div>
    <div class="loading-subtext" id="loading-subtext">Initializing 3D Engine...</div>
    <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="progress-percent" id="progress-percent">0%</div>
</div>

<div id="controls-hint" style="display: none;">
    <div class="hint-item"><span class="hint-icon">🖱️</span> Left Click + Drag to Rotate</div>
    <div class="hint-item"><span class="hint-icon">🖐️</span> Right Click + Drag to Pan</div>
    <div class="hint-item"><span class="hint-icon">🔍</span> Scroll to Zoom</div>
</div>

<script type="module">
    import * as GaussianSplats3D from 'https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/+esm';

    const params = new URLSearchParams(window.location.search);
    const splatUrl = params.get('url') || '/assets/room.splat';

    const subtextEl = document.getElementById('loading-subtext');
    const progressBar = document.getElementById('progress-bar');
    const progressPercent = document.getElementById('progress-percent');
    const loadingText = document.querySelector('.loading-text');

    // Simulated progress: animate from 0 to ~90% while loading
    let currentProgress = 0;
    let progressDone = false;
    const progressInterval = setInterval(() => {
        if (progressDone) return;
        // Slow down as it approaches 90
        const remaining = 90 - currentProgress;
        const increment = Math.max(0.3, remaining * 0.04);
        currentProgress = Math.min(90, currentProgress + increment);
        const pct = Math.round(currentProgress);
        progressBar.style.width = pct + '%';
        progressPercent.innerText = pct + '%';
    }, 200);

    function finishProgress() {
        progressDone = true;
        clearInterval(progressInterval);
        // Animate from current to 100
        let p = currentProgress;
        const finishInterval = setInterval(() => {
            p = Math.min(100, p + 3);
            progressBar.style.width = Math.round(p) + '%';
            progressPercent.innerText = Math.round(p) + '%';
            if (p >= 100) {
                clearInterval(finishInterval);
            }
        }, 30);
    }

    function showError(msg) {
        progressDone = true;
        clearInterval(progressInterval);
        if (loadingText) {
            loadingText.innerText = "Error Loading 3D Scan";
            loadingText.style.color = "#d90429";
        }
        if (subtextEl) {
            subtextEl.innerText = msg;
            subtextEl.style.color = "#d90429";
        }
        progressPercent.innerText = "✕";
        progressPercent.style.color = "#d90429";
    }

    try {
        subtextEl.innerText = "Connecting to 3D Server...";

        const viewer = new GaussianSplats3D.Viewer({
            'sharedMemoryForWorkers': false,
            'useBuiltInControls': true
        });

        subtextEl.innerText = "Downloading 3D Scan...";

        viewer.addSplatScene(splatUrl, {
            'showLoadingUI': false,
            'progressiveLoad': false
        })
        .then(() => {
            finishProgress();
            subtextEl.innerText = "Rendering 3D Scene...";

            setTimeout(() => {
                const overlay = document.getElementById('loading-overlay');
                if (overlay) {
                    overlay.style.opacity = 0;
                    setTimeout(() => {
                        overlay.remove();
                        document.getElementById('controls-hint').style.display = 'flex';
                    }, 800);
                }
            }, 400);

            viewer.start();
        })
        .catch((err) => {
            console.error("Failed to load splat scene:", err);
            showError("Failed to fetch 3D file: " + (err.message || "Network error"));
        });
    } catch (err) {
        console.error("3D Walkthrough initialization error:", err);
        showError(err.message || "WebGL 2.0 is not supported in this browser.");
    }
</script>

</body>
</html>
